<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Registro</title>
</head>

<body>

    <div class="container">
        <h1>Criar Conta</h1>

        <form action="#" method="post">
            <div class="campo">
                <label for="nome">Nome completo:</label>
                <input type="text" id="nome" name="nome">
            </div>

            <div class="campo">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="campo">
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password">
            </div>

            <div class="campo">
                <label for="passwordconfir">Confirmar senha:</label>
                <input type="password" id="passwordconfir" name="passwordconfir">
            </div>

            <div class="campo">
                <label for="data">Data de nascimento:</label>
                <input type="date" id="data" name="data">
            </div>

            <div class="campo">
                <p>Interesses</p>
                <input type="checkbox" name="interesses" id="tecnologia">
                <label for="tecnologia" style="display: inline;">Tecnologia</label>
                <input type="checkbox" name="interesses" id="esportes">
                <label for="esportes" style="display: inline;">Esportes</label>
                <input type="checkbox" name="interesses" id="musica">
                <label for="musica" style="display: inline;">Música</label>
            </div>

            <div class="campo">
                <p>Gênero</p>
                <input type="radio" name="genero" id="masc" value="masculino">
                <label for="masc" style="display: inline;">Masculino</label>

                <input type="radio" name="genero" id="fem" value="feminino">
                <label for="fem" style="display: inline;">Feminino</label>
            </div>

            <div class="campo">
                <p>País</p>
                <select name="country" id="country">
                    <option value="1">Brasil</option>
                    <option value="2">Estados Unidos</option>
                    <option value="3">México</option>
                </select>
            </div>

            <div class="campo">
                <input type="checkbox" name="termos" id="termos">
                <label for="termos" style="display: inline;">Aceito os termos</label>
            </div>

            <button type="submit">Criar conta</button>
        </form>

        <a href="login.html">Já tenho uma conta</a>
        <a href="login.html">Voltar para o Login</a>
    </div>

</body>

</html>
