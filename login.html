<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body style="display: grid; place-items: center; height: 30vh;">
    <h1>Tela de Login</h1>

    <form action="#" method="post">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email">
        <br><br>

        <label for="senha">Senha:</label>
        <input type="password" id="password" name="password">
        <br><br>

        <input type="checkbox" name="lembrar-me" id="lembrar-me">
        <label for="lembrar-me">Lebrar-me</label>
        <br><br>
    </form>
    <button type="submit" style="text-decoration: none;">Entrar</button>

    <p><a href="register.html">Esqueci minha senha</a><br><a href="register.html">Criar Conta</a></p>

    <button><a href="index.html" style="text-decoration: none;">Página inicial</a></button>
</body>

</html>
